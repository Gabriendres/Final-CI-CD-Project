
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: remove-temp-files
      image: alpine
      script: |
        rm -rf /workspace/tmp/*
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-tests
spec:
  steps:
    - name: run-tests
      image: python:3.9
      script: |
        pip install nose
        nosetests
